<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EscApp UI</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>EscApp</h1>
      <p>Basic prototype UI</p>
    </header>

    <section class="card">
      <h2>Auth</h2>
      <div class="form-row">
        <input id="auth-email" type="email" placeholder="Email" />
        <input id="auth-password" type="password" placeholder="Password" />
        <input id="auth-name" type="text" placeholder="Name (register only)" />
      </div>
      <div class="button-row">
        <button id="register-btn">Register</button>
        <button id="login-btn">Login</button>
        <button id="refresh-btn">Refresh Token</button>
      </div>
    </section>

    <section class="card">
      <h2>Profile</h2>
      <button id="profile-btn">Load Profile</button>
      <pre id="profile-output">Not loaded</pre>
    </section>

    <section class="card">
      <h2>Game Sessions</h2>
      <button id="sessions-btn">List Sessions</button>
      <pre id="sessions-output">Not loaded</pre>
    </section>

    <section class="card admin-card">
      <h2>Admin</h2>
      <button id="admin-users-btn">List Users</button>
      <pre id="admin-output">Admin results appear here</pre>
    </section>

    <section class="card">
      <h2>Status</h2>
      <p>Access token: <span id="token-status">Not logged in</span></p>
      <p>Refresh token: <span id="refresh-status">Not set</span></p>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
