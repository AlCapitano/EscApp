services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: '[REDACTED]'
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d app_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://user:[REDACTED]@postgres:5432/app_db?schema=public
      JWT_ACCESS_TOKEN_SECRET: access-secret
      JWT_ACCESS_TOKEN_EXPIRATION: 60m
      JWT_REFRESH_TOKEN_SECRET: refresh-secret
      JWT_REFRESH_TOKEN_EXPIRATION: 1d
    volumes:
      - ./backend/src:/usr/src/app/src
      - ./backend/prisma:/usr/src/app/prisma
    ports:
      - "3000:3000"
    command: /bin/bash -c "npm run prisma:generate && sleep 2 && npm run prisma:db:push && npm run start:dev"

volumes:
  postgres_data:
